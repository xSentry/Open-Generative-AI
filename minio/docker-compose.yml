services:
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # Allow the app origin to read objects/headers cross-origin. The app runs
      # on Next.js (default http://localhost:3000); "*" keeps local dev simple
      # and covers alternate ports. Restrict this to your real origin(s) in prod
      # (comma-separated list supported).
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb --ignore-existing local/aistudio;
      "

volumes:
  minio-data:
