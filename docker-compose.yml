services:
  open-generative-ai:
    build: .
    container_name: open-generative-ai
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      # Studio generations persistence + async generation (see README)
      - STUDIO_ASYNC_GENERATIONS=${STUDIO_ASYNC_GENERATIONS:-false}
      - STUDIO_WORKER_IN_PROCESS=${STUDIO_WORKER_IN_PROCESS:-true}
      - STUDIO_WORKER_CONCURRENCY=${STUDIO_WORKER_CONCURRENCY:-4}
      - STUDIO_GENERATION_TIMEOUT_MINUTES=${STUDIO_GENERATION_TIMEOUT_MINUTES:-30}
      - STUDIO_DELETE_INPUTS_AFTER_GENERATION=${STUDIO_DELETE_INPUTS_AFTER_GENERATION:-true}
      - STUDIO_OUTPUT_URL_MODE=${STUDIO_OUTPUT_URL_MODE:-signed}
    restart: unless-stopped
