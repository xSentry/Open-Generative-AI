services:
  web:
    build: .
    container_name: open-generative-ai-web
    command: npm run start
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - BULLMQ_PREFIX=${BULLMQ_PREFIX:-open-generative-ai}
      - STUDIO_ASYNC_GENERATIONS=${STUDIO_ASYNC_GENERATIONS:-true}
      - STUDIO_QUEUE_NAME=${STUDIO_QUEUE_NAME:-studio-generations}
      - WORKFLOW_QUEUE_NAME=${WORKFLOW_QUEUE_NAME:-workflow-runs}
      - STUDIO_DELETE_INPUTS_AFTER_GENERATION=${STUDIO_DELETE_INPUTS_AFTER_GENERATION:-true}
      - STUDIO_OUTPUT_URL_MODE=${STUDIO_OUTPUT_URL_MODE:-signed}
    depends_on:
      - redis
    restart: unless-stopped

  studio-worker:
    build: .
    command: npm run worker:studio
    environment:
      - NODE_ENV=production
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - BULLMQ_PREFIX=${BULLMQ_PREFIX:-open-generative-ai}
      - STUDIO_QUEUE_NAME=${STUDIO_QUEUE_NAME:-studio-generations}
      - STUDIO_WORKER_CONCURRENCY=${STUDIO_WORKER_CONCURRENCY:-4}
      - STUDIO_JOB_ATTEMPTS=${STUDIO_JOB_ATTEMPTS:-3}
      - STUDIO_JOB_BACKOFF_MS=${STUDIO_JOB_BACKOFF_MS:-5000}
      - STUDIO_DELETE_INPUTS_AFTER_GENERATION=${STUDIO_DELETE_INPUTS_AFTER_GENERATION:-true}
      - STUDIO_OUTPUT_URL_MODE=${STUDIO_OUTPUT_URL_MODE:-signed}
    depends_on:
      - redis
    restart: unless-stopped

  workflow-worker:
    build: .
    command: npm run worker:workflow
    environment:
      - NODE_ENV=production
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - BULLMQ_PREFIX=${BULLMQ_PREFIX:-open-generative-ai}
      - WORKFLOW_QUEUE_NAME=${WORKFLOW_QUEUE_NAME:-workflow-runs}
      - WORKFLOW_WORKER_CONCURRENCY=${WORKFLOW_WORKER_CONCURRENCY:-2}
      - WORKFLOW_JOB_ATTEMPTS=${WORKFLOW_JOB_ATTEMPTS:-2}
      - WORKFLOW_JOB_BACKOFF_MS=${WORKFLOW_JOB_BACKOFF_MS:-5000}
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: open-generative-ai-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
