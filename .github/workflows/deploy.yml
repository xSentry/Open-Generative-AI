name: Build and Deploy Open Generative AI via GHCR

on:
  push:
    branches:
      - deploy

env:
  IMAGE_NAME: ghcr.io/omnedia/open-generative-ai
  DEPLOY_PATH: projects/aihub

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: xSentry
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy Compose file to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "./docker-compose.server.yml"
          target: "${{ env.DEPLOY_PATH }}/"

      - name: SSH to server and deploy containers
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            mkdir -p ${{ env.DEPLOY_PATH }}
            cd ${{ env.DEPLOY_PATH }}

            mv -f docker-compose.server.yml docker-compose.yml

            cat > .env <<'EOF'
            ${{ secrets.AIHUB_ENV_FILE }}
            EOF

            printf '\nIMAGE_TAG=%s\n' '${{ github.sha }}' >> .env

            docker login ghcr.io -u xSentry -p '${{ secrets.GHCR_PAT }}'

            docker compose pull
            docker compose run --rm --no-deps web npm run db:migrate
            docker compose up -d --force-recreate --remove-orphans
